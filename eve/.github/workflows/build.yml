name: build-eve-native

on:
  push:
    tags: ["eve-v*"]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { plat: linux/amd64, base: debian:bookworm, dest: linux-x86-64 }
          - { plat: linux/arm64, base: debian:bookworm, dest: linux-aarch64 }
          - { plat: linux/amd64, base: alpine:3.20,     dest: linux-musl-x86-64 }
          - { plat: linux/arm64, base: alpine:3.20,     dest: linux-musl-aarch64 }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: build ${{ matrix.dest }}
        working-directory: eve
        run: |
          docker buildx build --platform ${{ matrix.plat }} \
            -f docker/Dockerfile.linux --build-arg BASE=${{ matrix.base }} \
            --target export --output type=local,dest=out/${{ matrix.dest }} .
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.dest }}
          path: eve/out/${{ matrix.dest }}/libeve.so

  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - { arch: x86-64, cmake_arch: x64 }
          - { arch: aarch64, cmake_arch: ARM64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - name: build windows-${{ matrix.arch }}
        working-directory: eve
        shell: bash
        run: |
          cmake -S . -B build -A ${{ matrix.cmake_arch }} \
            -DEVE_BUILD_JNI=ON -DEVE_BUILD_TESTS=OFF -DJAVA_HOME="$JAVA_HOME"
          cmake --build build --config Release
          mkdir -p out
          cp build/Release/eve.dll out/eve.dll
      - uses: actions/upload-artifact@v4
        with:
          name: native-windows-${{ matrix.arch }}
          path: eve/out/eve.dll

  macos:
    strategy:
      matrix:
        include:
          - { runner: macos-14, arch: aarch64 }
          - { runner: macos-13, arch: x86-64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - name: build macos-${{ matrix.arch }}
        working-directory: eve
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DEVE_BUILD_JNI=ON -DEVE_BUILD_TESTS=OFF -DJAVA_HOME="$JAVA_HOME"
          cmake --build build -j
          mkdir -p out
          cp build/libeve.dylib out/libeve.dylib
      - uses: actions/upload-artifact@v4
        with:
          name: native-macos-${{ matrix.arch }}
          path: eve/out/libeve.dylib

  jar:
    needs: [linux, windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: assemble eve.jar
        working-directory: eve
        run: |
          set -eux
          R=build-jar/teacommontea/eve
          N=build-jar/native
          mkdir -p "$R" "$N"
          javac -d build-jar java/teacommontea/eve/Eve.java
          place() { mkdir -p "$N/$1"; cp "$2" "$N/$1/$3"; }
          place linux-x86-64        ../../artifacts/native-linux-x86-64/libeve.so          libeve.so
          place linux-aarch64       ../../artifacts/native-linux-aarch64/libeve.so         libeve.so
          place linux-musl-x86-64   ../../artifacts/native-linux-musl-x86-64/libeve.so     libeve.so
          place linux-musl-aarch64  ../../artifacts/native-linux-musl-aarch64/libeve.so    libeve.so
          place windows-x86-64      ../../artifacts/native-windows-x86-64/eve.dll          eve.dll
          place windows-aarch64     ../../artifacts/native-windows-aarch64/eve.dll         eve.dll
          place macos-aarch64       ../../artifacts/native-macos-aarch64/libeve.dylib      libeve.dylib
          place macos-x86-64        ../../artifacts/native-macos-x86-64/libeve.dylib       libeve.dylib
          ( cd build-jar && jar cf ../eve.jar . )
          ls -la eve.jar
          jar tf eve.jar | grep native
      - uses: actions/upload-artifact@v4
        with: { name: eve-jar, path: eve/eve.jar }
